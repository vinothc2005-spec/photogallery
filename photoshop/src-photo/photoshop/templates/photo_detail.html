{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ photo.title }}</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:80%;
    max-width:900px;
    background:#222;
    padding:30px;
    border-radius:20px;
}

img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#ccc;
}

.back{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:orange;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

</style>

</head>
<body>

<div class="container">

    <img src="{{ photo.image.url }}" alt="">

    <h1>{{ photo.title }}</h1>

    <p>{{ photo.category }}</p>

    <p>{{ photo.description }}</p>

    <a href="{% url 'home' %}" class="back">← Back</a>

</div>

</body>
</html>
